# Faza 0g.3 (08.05.2026): GitHub Actions workflow dla printsoft-assist-client.
#
# WGRAJ TEN PLIK DO: printsoft-assist-client/.github/workflows/printsoft-release.yml
#
# Walidowane na RustDesk 1.4.6 patterny — copy-paste z ich flutter-build.yml,
# uproszczone do 3 platformy (Mac arm64+x64, Windows x64, Linux x64).
#
# Trigger: push tag assist-X.Y.Z lub workflow_dispatch.
# Output: GitHub Release w printsoft-assist-client z artefaktami:
#   - printsoft-assist-{tag}-aarch64.dmg
#   - printsoft-assist-{tag}-x86_64.dmg
#   - printsoft-assist-{tag}.exe
#   - printsoft-assist-{tag}-x86_64.deb
#
# Czas: zimny cache ~50 min Mac, 45 min Win, 40 min Linux. Ciepły ~12-15 min.

name: Printsoft Assist Release

on:
  workflow_dispatch:
  push:
    tags:
      - 'assist-*'

env:
  RUST_VERSION: "1.75"
  MAC_RUST_VERSION: "1.81"
  LLVM_VERSION: "15.0.6"
  FLUTTER_VERSION: "3.24.5"
  # Kluczowe: GHA binary cache dla vcpkg, bez tego ffmpeg compile 30+ min za kazdym razem
  VCPKG_BINARY_SOURCES: "clear;x-gha,readwrite"
  # Pinowane do RustDesk 1.4.6 walidowanego commit'a vcpkg
  VCPKG_COMMIT_ID: "120deac3062162151622ca4860575a33844ba10b"
  TAG_NAME: ${{ github.ref_name }}

jobs:
  generate-bridge:
    name: Generate flutter_rust_bridge artifacts
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Install rsvg-convert + imagemagick
        run: sudo apt-get update && sudo apt-get install -y librsvg2-bin imagemagick

      - name: Apply Printsoft branding
        run: bash scripts/apply-branding.sh

      - uses: dtolnay/rust-toolchain@v1
        with:
          toolchain: ${{ env.RUST_VERSION }}
          components: rustfmt

      - name: Install protoc
        run: sudo apt-get install -y protobuf-compiler

      # flutter_rust_bridge_codegen post-processes Dart code przez 'flutter format',
      # wiec flutter MUSI byc dostepny w PATH zanim wywolamy codegen.
      - uses: subosito/flutter-action@v2
        with:
          channel: stable
          flutter-version: ${{ env.FLUTTER_VERSION }}

      - name: Install flutter_rust_bridge_codegen
        run: cargo install flutter_rust_bridge_codegen --version 1.80.1 --features uuid --locked

      # 0g.14b (10.05.2026): flutter pub get jest wymagany ZANIM ffigen
      # (subprocess flutter_rust_bridge_codegen) probuje czytac package_config.json.
      # Bez tego: "Cannot open file, path = '.dart_tool/package_config.json'".
      - name: Flutter pub get (preq for ffigen)
        run: cd flutter && flutter pub get

      - name: Generate bridge
        run: |
          flutter_rust_bridge_codegen \
            --rust-input ./src/flutter_ffi.rs \
            --dart-output ./flutter/lib/generated_bridge.dart \
            --c-output ./flutter/macos/Runner/bridge_generated.h

      - uses: actions/upload-artifact@v4
        with:
          name: bridge-artifact
          path: |
            ./src/bridge_generated.rs
            ./src/bridge_generated.io.rs
            ./src/bridge_generated.web.rs
            ./flutter/lib/generated_bridge.dart
            ./flutter/lib/generated_bridge.freezed.dart
            ./flutter/macos/Runner/bridge_generated.h
          if-no-files-found: warn

  build-macos:
    needs: [generate-bridge]
    name: macOS ${{ matrix.job.arch }}
    runs-on: ${{ matrix.job.os }}
    strategy:
      fail-fast: false
      matrix:
        job:
          - { target: aarch64-apple-darwin, os: macos-14,       arch: aarch64, vcpkg-triplet: arm64-osx, extra: "--screencapturekit" }
          - { target: x86_64-apple-darwin,  os: macos-13,       arch: x86_64,  vcpkg-triplet: x64-osx,   extra: "" }
    steps:
      - uses: actions/github-script@v7
        with:
          script: |
            core.exportVariable('ACTIONS_CACHE_URL', process.env.ACTIONS_CACHE_URL || '');
            core.exportVariable('ACTIONS_RUNTIME_TOKEN', process.env.ACTIONS_RUNTIME_TOKEN || '');

      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Apply Printsoft branding
        run: |
          brew install librsvg imagemagick
          bash scripts/apply-branding.sh

      - name: Install brew dependencies
        run: |
          brew install create-dmg
          command -v pkg-config >/dev/null || brew install pkg-config

      - name: Install NASM 2.16.03
        run: |
          wget https://www.nasm.us/pub/nasm/releasebuilds/2.16.03/macosx/nasm-2.16.03-macosx.zip
          unzip nasm-2.16.03-macosx.zip
          sudo cp nasm-2.16.03/nasm /usr/local/bin/nasm

      - uses: subosito/flutter-action@v2
        with:
          channel: stable
          flutter-version: ${{ env.FLUTTER_VERSION }}

      - uses: dtolnay/rust-toolchain@v1
        with:
          toolchain: ${{ env.MAC_RUST_VERSION }}
          targets: ${{ matrix.job.target }}
          components: rustfmt

      - uses: Swatinem/rust-cache@v2
        with:
          prefix-key: ${{ matrix.job.os }}

      - uses: actions/download-artifact@v4
        with:
          name: bridge-artifact
          path: ./

      - uses: lukka/run-vcpkg@v11
        with:
          vcpkgGitCommitId: ${{ env.VCPKG_COMMIT_ID }}
          doNotCache: false

      - name: Install vcpkg dependencies
        run: |
          $VCPKG_ROOT/vcpkg install --triplet ${{ matrix.job.vcpkg-triplet }} --x-install-root="$VCPKG_ROOT/installed"

      - name: Build
        run: ./build.py --flutter --hwcodec --unix-file-copy-paste ${{ matrix.job.extra }}

      - name: Find app bundle
        id: find_app
        run: |
          APP_PATH=$(find ./flutter/build/macos/Build/Products/Release -maxdepth 2 -name "*.app" -type d | head -1)
          echo "Found app at: $APP_PATH"
          echo "app_path=$APP_PATH" >> $GITHUB_OUTPUT

      - name: Create DMG
        run: |
          # Patch create-dmg dla flaky CI
          CREATE_DMG="$(readlink -f "$(command -v create-dmg)")"
          sed -i -e 's/MAXIMUM_UNMOUNTING_ATTEMPTS=3/MAXIMUM_UNMOUNTING_ATTEMPTS=7/' "$CREATE_DMG"

          APP_PATH="${{ steps.find_app.outputs.app_path }}"
          APP_NAME=$(basename "$APP_PATH")
          DMG_NAME="printsoft-assist-${TAG_NAME#assist-}-${{ matrix.job.arch }}.dmg"

          create-dmg --icon "$APP_NAME" 200 190 --hide-extension "$APP_NAME" \
            --window-size 800 400 --app-drop-link 600 185 \
            "$DMG_NAME" "$APP_PATH"

      # 0g.14b ci-fix5 (10.05.2026): upload DMG jako artifact ZANIM probujemy
      # release (ktory wymaga contents: write permission). Bez tego: DMG sie
      # buduje na runnerze ale propelowane wraz z workerem po jobie. Z artifact:
      # mozna pobrac przez `gh run download` przez 90 dni, niezaleznie od release.
      - name: Upload DMG as artifact (always available)
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: printsoft-assist-${{ matrix.job.arch }}-dmg
          path: '*-${{ matrix.job.arch }}.dmg'
          if-no-files-found: warn

      - uses: softprops/action-gh-release@v2
        if: startsWith(github.ref, 'refs/tags/')
        with:
          prerelease: true
          tag_name: ${{ env.TAG_NAME }}
          files: '*-${{ matrix.job.arch }}.dmg'

  build-windows:
    needs: [generate-bridge]
    runs-on: windows-2022
    steps:
      - uses: actions/github-script@v7
        with:
          script: |
            core.exportVariable('ACTIONS_CACHE_URL', process.env.ACTIONS_CACHE_URL || '');
            core.exportVariable('ACTIONS_RUNTIME_TOKEN', process.env.ACTIONS_RUNTIME_TOKEN || '');

      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Install msys2 (dla rsvg-convert + imagemagick)
        uses: msys2/setup-msys2@v2
        with:
          msystem: MINGW64
          # MINGW64 paczki wymagaja prefiksu 'mingw-w64-x86_64-' (10.05.2026 fix)
          install: mingw-w64-x86_64-librsvg mingw-w64-x86_64-imagemagick

      - name: Apply Printsoft branding
        shell: bash
        run: bash scripts/apply-branding.sh

      - uses: KyleMayes/install-llvm-action@v2
        with:
          version: ${{ env.LLVM_VERSION }}

      - uses: subosito/flutter-action@v2
        with:
          channel: stable
          flutter-version: ${{ env.FLUTTER_VERSION }}

      - uses: dtolnay/rust-toolchain@v1
        with:
          toolchain: ${{ env.RUST_VERSION }}
          targets: x86_64-pc-windows-msvc
          components: rustfmt

      - uses: Swatinem/rust-cache@v2
        with:
          prefix-key: windows-2022

      - uses: actions/download-artifact@v4
        with:
          name: bridge-artifact
          path: ./

      - uses: lukka/run-vcpkg@v11
        with:
          vcpkgDirectory: C:\vcpkg
          vcpkgGitCommitId: ${{ env.VCPKG_COMMIT_ID }}
          doNotCache: false

      - name: Install vcpkg dependencies
        shell: bash
        env:
          VCPKG_DEFAULT_HOST_TRIPLET: x64-windows-static
        run: $VCPKG_ROOT/vcpkg install --triplet x64-windows-static --x-install-root="$VCPKG_ROOT/installed"

      - name: Build
        # 11.05.2026: usuniete --skip-portable-pack. Bez tego dostawalismy goly
        # rustdesk.exe 358KB ktory szukal DLL obok (librustdesk.dll 35MB,
        # flutter_windows.dll 18MB + 14 plugin DLLs + assets/) - klient dostal
        # crash "DLL not found" przy uruchomieniu. Z portable-pack build.py
        # robi `rustdesk-{version}-install.exe` self-extracting (~70MB)
        # ktore unpackuje wszystko do tempa przy uruchomieniu.
        run: python3 .\build.py --portable --hwcodec --flutter --vram

      - name: Locate built artifacts
        shell: bash
        run: |
          ls -la ./SignOutput/ 2>/dev/null || true
          ls -la *.exe 2>/dev/null || true
          ls -la ./flutter/build/windows/x64/runner/Release/ 2>/dev/null || true
          # Sanityzuj TAG_NAME — workflow_dispatch z brancha "feature/foo" wstawia
          # slash do filename i `cp out/printsoft-assist-feature/foo.exe` traktuje
          # to jako podkatalog → fail. Zamiana / na -.
          SAFE_TAG="${TAG_NAME#assist-}"
          SAFE_TAG="${SAFE_TAG//\//-}"
          mkdir -p out
          # 1. Najpierw self-extracting installer z portable-pack (rustdesk-*-install.exe w root)
          for f in ./rustdesk-*-install.exe ./*-install.exe; do
            if [ -f "$f" ]; then
              cp "$f" "out/printsoft-assist-${SAFE_TAG}.exe"
              echo "Found portable installer: $f"
              break
            fi
          done
          # 2. SignOutput fallback (gdy custom signing setup)
          if [ ! -f out/*.exe ]; then
            for f in ./SignOutput/*.exe; do
              if [ -f "$f" ]; then
                cp "$f" "out/printsoft-assist-${SAFE_TAG}.exe"
                echo "Found signed exe: $f"
                break
              fi
            done
          fi
          # 3. Ostateczny fallback: surowy Release exe (BEZ DLL - tylko awaryjnie)
          if [ ! -f out/*.exe ]; then
            echo "WARNING: brak portable installer ani SignOutput - probuje raw Release exe (bez DLL!)"
            find ./flutter/build/windows/x64/runner/Release -name "rustdesk.exe" -exec cp {} "out/printsoft-assist-${SAFE_TAG}.exe" \;
          fi
          ls -la out/

      - uses: actions/upload-artifact@v4
        with:
          name: printsoft-assist-windows
          path: out/*.exe
          if-no-files-found: error
          retention-days: 14

      - uses: softprops/action-gh-release@v2
        continue-on-error: true
        with:
          prerelease: true
          tag_name: ${{ env.TAG_NAME }}
          files: out/*.exe

  build-linux:
    needs: [generate-bridge]
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/github-script@v7
        with:
          script: |
            core.exportVariable('ACTIONS_CACHE_URL', process.env.ACTIONS_CACHE_URL || '');
            core.exportVariable('ACTIONS_RUNTIME_TOKEN', process.env.ACTIONS_RUNTIME_TOKEN || '');

      - name: Maximize build space
        run: |
          sudo rm -rf /opt/ghc /usr/local/lib/android /usr/share/dotnet
          sudo apt-get update -y
          sudo apt-get install -y nasm qemu-user-static librsvg2-bin imagemagick

      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Apply Printsoft branding
        run: bash scripts/apply-branding.sh

      - uses: dtolnay/rust-toolchain@v1
        with:
          toolchain: ${{ env.RUST_VERSION }}
          targets: x86_64-unknown-linux-gnu
          components: rustfmt

      - name: Save Rust toolchain version
        run: echo "RUST_TOOLCHAIN_VERSION=$(cargo --version | awk '{print $2}')" >> $GITHUB_ENV

      - name: Disable rust bridge build w Cargo.toml (build w containerze)
        run: sed -i 's/\["cdylib", "staticlib", "rlib"\]/\["cdylib"\]/g' Cargo.toml

      - uses: actions/download-artifact@v4
        with:
          name: bridge-artifact
          path: ./

      - name: Setup vcpkg directory
        run: |
          sudo mkdir -p /opt/artifacts
          sudo chown $USER:$USER /opt/artifacts

      - uses: lukka/run-vcpkg@v11
        with:
          vcpkgDirectory: /opt/artifacts/vcpkg
          vcpkgGitCommitId: ${{ env.VCPKG_COMMIT_ID }}
          doNotCache: false

      - name: Install vcpkg dependencies
        run: |
          sudo apt-get install -y libva-dev
          $VCPKG_ROOT/vcpkg install --triplet x64-linux --x-install-root="$VCPKG_ROOT/installed"

      - name: Build (Ubuntu 18.04 container - omija libgstreamer/libunwind issues z 22.04)
        uses: rustdesk-org/run-on-arch-action@amd64-support
        with:
          arch: x86_64
          distro: ubuntu18.04
          githubToken: ${{ github.token }}
          dockerRunArgs: |
            --volume "${PWD}:/workspace"
            --volume "/opt/artifacts:/opt/artifacts"
          shell: /bin/bash
          install: |
            apt-get update -y
            apt-get install -y build-essential clang cmake curl gcc git g++ \
              libayatana-appindicator3-dev libasound2-dev libclang-10-dev \
              libgstreamer1.0-dev libgstreamer-plugins-base1.0-dev libgtk-3-dev \
              libpam0g-dev libpulse-dev libva-dev libxcb-randr0-dev \
              libxcb-shape0-dev libxcb-xfixes0-dev libxdo-dev libxfixes-dev \
              llvm-10-dev nasm ninja-build pkg-config tree python3 rpm unzip \
              wget xz-utils libssl-dev
            apt-get remove -y libopus-dev || true
          run: |
            set -ex
            git config --global --add safe.directory "*"

            # Rust install z prebuilt tarball (rustup nie dziala dobrze w starszym container)
            pushd /opt
            wget -O rust.tar.gz https://static.rust-lang.org/dist/rust-${RUST_TOOLCHAIN_VERSION}-x86_64-unknown-linux-gnu.tar.gz
            tar -zxf rust.tar.gz && rm rust.tar.gz
            cd rust-${RUST_TOOLCHAIN_VERSION}-x86_64-unknown-linux-gnu && ./install.sh
            cd .. && rm -rf rust-${RUST_TOOLCHAIN_VERSION}-x86_64-unknown-linux-gnu
            mkdir -p ~/.cargo/
            echo "[source.crates-io]" > ~/.cargo/config
            echo "registry = 'https://github.com/rust-lang/crates.io-index'" >> ~/.cargo/config

            cd /workspace
            export VCPKG_ROOT=/opt/artifacts/vcpkg
            cargo build --lib --features hwcodec,flutter,unix-file-copy-paste --release
            rm -rf target/release/deps target/release/build ~/.cargo

            # Flutter install
            pushd /opt
            wget https://storage.googleapis.com/flutter_infra_release/releases/stable/linux/flutter_linux_${FLUTTER_VERSION}-stable.tar.xz
            tar xf flutter_linux_${FLUTTER_VERSION}-stable.tar.xz
            export PATH=/opt/flutter/bin:$PATH
            flutter doctor -v

            cd /workspace
            export CARGO_INCREMENTAL=0
            export DEB_ARCH=amd64
            python3 ./build.py --flutter --skip-cargo

            for name in *.deb; do mv "$name" "${name%.deb}-x86_64.deb"; done
        env:
          RUST_TOOLCHAIN_VERSION: ${{ env.RUST_TOOLCHAIN_VERSION }}
          FLUTTER_VERSION: ${{ env.FLUTTER_VERSION }}

      - uses: softprops/action-gh-release@v2
        with:
          prerelease: true
          tag_name: ${{ env.TAG_NAME }}
          files: ./*-x86_64.deb
